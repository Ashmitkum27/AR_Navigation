<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart AR Navigation</title>

<link rel="stylesheet" href="style.css">

<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<script src="script.js" defer></script>
</head>

<body>

<div class="container">
    <h1>🚀 Smart AR Navigation</h1>

    <input type="text" id="destination" placeholder="Enter location (e.g. Pune)">
    <button onclick="startNavigation()">Start Navigation</button>

    <div class="controls">
        <button onclick="enableAR()">📱 AR Mode</button>
        <button onclick="enableVR()">🕶️ VR Mode</button>
    </div>

    <div id="status">Status: Waiting...</div>
</div>

<a-scene embedded arjs id="arScene" style="display:none;">
    <a-camera gps-camera rotation-reader></a-camera>

    <!-- BIG visible box -->
    <a-box 
        id="arrow"
        position="0 1 -3"
        color="yellow"
        scale="1.5 1.5 1.5">
    </a-box>

</a-scene>

</body>
</html>
